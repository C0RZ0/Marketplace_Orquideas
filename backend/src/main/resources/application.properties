spring.application.name=proyecto-orquideas

spring.config.import=optional:classpath:application-local.properties

# Base de datos
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA y Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# Wompi
wompi.public-key=${WOMPI_PUBLIC_KEY:pub_test_qz0SaS8PxrQznNp4mfWZIYZL2qL7fRu0}
wompi.private-key=${WOMPI_PRIVATE_KEY:prv_test_J8l0ZeUpGuYOAQV3i3Oex1TXU35GRhEi}
wompi.integrity-secret=${WOMPI_INTEGRITY_SECRET:test_integrity_secret}
wompi.events-secret=${WOMPI_EVENTS_SECRET:test_events_secret}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Información de contacto WhatsApp
contacto.whatsapp.numero=${WHATSAPP_NUMERO}
contacto.whatsapp.mensaje=${WHATSAPP_MENSAJE}

# Server
server.port=${PORT:8080}

# JWT — el token que le damos al frontend tras el login, .expiration es el tiempo que dura ese token antes de expirar, en milisegundos (24 horas aqui)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Correo del admin para asignarle el rol ADMINISTRADOR automáticamente
admin.email=${ADMIN_EMAIL}

# URL del frontend para redirigir después del login con Google
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# URL del frontend para redirigir después del login con Google
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
